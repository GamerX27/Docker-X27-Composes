services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Oslo
      - JELLYFIN_PublishedServerUrl=http://192.168.0.5
    #   - NVIDIA_VISIBLE_DEVICES=all
    #   - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    volumes:
      - /home/X27/docker/jellyfin/config:/config
      - /mnt/Media:/Media
    ports:
      - 8096:8096
      - 7359:7359/udp
    # For Intel/AMD GPUs (uncomment if using)
    # devices:
    #   - /dev/dri:/dev/dri

    #For Nvidia GPUs  (uncomment if using)
    #   deploy:
    #     resources:
    #       reservations:
    #         devices:
    #           - driver: nvidia
    #             count: all
    #             capabilities: [gpu]
    restart: unless-stopped
